<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>香江金融中心 - 开门</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f5f5f5;height:100vh}
.page{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;padding:20px}
.qr-box{background:#fff;padding:24px;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.08);text-align:center}
.qr-box canvas,.qr-box img{display:block;margin:0 auto}
.title{font-size:18px;font-weight:600;color:#333;margin-bottom:8px}
.desc{font-size:13px;color:#999;margin-bottom:20px}
.loading-text{font-size:14px;color:#999;margin-top:12px}
</style>
</head>
<body>
<div class="page">
  <div class="qr-box" id="qrBox">
    <div class="title">微信扫码开门</div>
    <div class="desc">请使用微信扫描二维码</div>
    <div id="qrcode"></div>
    <div class="loading-text">或点击公众号菜单「开门」</div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script>
var ua = navigator.userAgent.toLowerCase();
var isWechat = ua.indexOf('micromessenger') !== -1;

if (isWechat) {
  location.replace('http://hfc.hkhc.com.cn/ownerIndexWeChat.html');
} else {
  new QRCode(document.getElementById('qrcode'), {
    text: 'https://fuoql.github.io/',
    width: 200,
    height: 200,
    colorDark: '#000',
    colorLight: '#fff'
  });
}
</script>
</body>
</html>

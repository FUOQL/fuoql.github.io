<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>香江金融中心 - 开门</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{display:flex;align-items:center;justify-content:center;height:100vh;background:#f5f5f5;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
.loading{text-align:center}
.spinner{width:40px;height:40px;border:3px solid #e0e0e0;border-top-color:#07c160;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.text{color:#999;font-size:14px}
</style>
</head>
<body>
<div class="loading">
  <div class="spinner"></div>
  <p class="text">正在前往香江金融中心...</p>
</div>
<script>
(function(){
  var ua = navigator.userAgent.toLowerCase();
  var isWechat = ua.indexOf('micromessenger') !== -1;
  if (isWechat) {
    location.replace('http://hfc.hkhc.com.cn/?a=2043');
  } else {
    var appId = 'wxbfbc106875370721';
    var redirectUri = encodeURIComponent('https://fuoql.github.io/');
    location.replace(
      'https://open.weixin.qq.com/connect/oauth2/authorize' +
      '?appid=' + appId +
      '&redirect_uri=' + redirectUri +
      '&response_type=code' +
      '&scope=snsapi_base' +
      '&state=redirect' +
      '#wechat_redirect'
    );
  }
})();
</script>
</body>
</html>
